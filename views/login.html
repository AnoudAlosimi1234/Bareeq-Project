<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - بريق</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<div class="page login-page">

    <!-- Logo -->
    <div class="logo">
        <img src="assets/images/logo2.png" alt="شعار بريق" class="logo-img">
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="login-form">

        <input type="email" id="email" 
        placeholder="البريد الإلكتروني" required>
    
        <input type="password" id="password" 
        placeholder="كلمة المرور" required>
    
        <!-- زر نسيت كلمة المرور -->
        <a href="reset-password-User.html" class="forgot-link">
            نسيت كلمة المرور؟
        </a>
    
        <button type="submit" class="btn login-btn">
            تسجيل الدخول
        </button>
    
    </form>
    <p class="footer-text">سعداء بعودتك 🌟</p>

    <!-- Character Image -->
    <div class="character">
        <img src="assets/images/character1.png" alt="طفل" class="character-img">
    </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    if(email && password){
        alert("مرحباً 👋 تم تسجيل الدخول بنجاح!");
        window.location.href = "home.html";
    } else {
        alert("يرجى إدخال البريد الإلكتروني وكلمة المرور");
    }
});
</script>

</body>
</html>
