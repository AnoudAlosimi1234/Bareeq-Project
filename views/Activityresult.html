<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتيجة النشاط - بريق</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>

<body class="page page-activity-result">

<div class="page-content activity-result-section">

    <!-- Decorative Elements -->
    <div class="decor-sun">🌞</div>
    <div class="decor-cloud decor-cloud--left">☁️</div>
    <div class="decor-cloud decor-cloud--right">☁️</div>

    <!-- Title -->
    <div class="activity-result-title">
        أداؤك مذهل في هذا النشاط!
    </div>

    <!-- Characters Section -->
    <div class="characters">
        <div class="character-card">
            <img src="assets/images/boy_award.png" alt="طفل">
            <p>هل أناديك البطل الخارق؟</p>
        </div>

        <div class="character-card">
            <img src="assets/images/girl_star.png" alt="طفلة">
            <p>اكتسبت 100 نقطة!</p>
        </div>
    </div>

    <!-- Stars Section (using emoji) -->
    <div class="stars-section">
        <div class="star-row">⭐ ⭐ ⭐</div>
        <div class="star-row">⭐ ⭐</div>
    </div>

    <!-- Action Buttons -->
    <div class="buttons-container">
       <a href="home.html" class="btn btn-home">
    العودة إلى الشاشة الرئيسية
</a>
    </div>


</div>
<script>
let score = localStorage.getItem("score");
if(score){
    document.querySelector(".character-card p").innerText = 
    "اكتسبت " + score + " نقطة!";
}
</script>
</body>
</html>
