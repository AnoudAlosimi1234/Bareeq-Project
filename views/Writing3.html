<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كتابة 5</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="writing3-page">

<div class="logo">
    <img src="assets/images/logo.png" alt="شعار بريق" class="logo-img">
</div>

<div class="cloud cloud1">☁️</div>
<div class="cloud cloud2">☁️</div>
<div class="sun">🌞</div>

<h1 class="wTitle">النشاط الثاني</h1>

<div class="instruction-row">
    <p>اكتب كلمة أم</p>
    <button class="play-btn" onclick="speakQ()" aria-label="تشغيل السؤال">▶</button>
</div>

<div class="canvas-wrapper">
    <canvas id="draw" width="350" height="180" aria-label="مساحة الكتابة"></canvas>
</div>

<div class="wButtons">
    <button class="wBtn delete" onclick="clearCanvas()">مسح</button>
    <button class="wBtn check" onclick="checkTrace()">تحقق</button>
</div>

<div id="feedback" class="feedback" aria-live="polite"></div>

<div class="girl">
    <img src="assets/images/A girl-writing5.png" alt="طفلة تفكر">
</div>

<img src="assets/images/A book.png" class="book" alt="" aria-hidden="true">

<script>
/* ===============================
   جميع الوظائف الأصلية + hover صوت
=================================*/
function goBack(){
    window.location.href="Writing4.html";
}

function speakQ(){
    const utter = new SpeechSynthesisUtterance("اكتب كلمةَ أُم");
    utter.lang = "ar-SA";
    speechSynthesis.speak(utter);
}

/* الكتابة/التحبير على الكانفاس */
const canvas=document.getElementById("draw");
const ctx=canvas.getContext("2d");
let drawing=false;
let strokes=0;

canvas.addEventListener("pointerdown",()=>drawing=true);
canvas.addEventListener("pointerup",()=>drawing=false);
canvas.addEventListener("pointermove",(e)=>{
    if(!drawing) return;
    ctx.lineWidth=4;
    ctx.lineCap="round";
    ctx.strokeStyle="#000";
    ctx.beginPath();
    ctx.moveTo(e.offsetX,e.offsetY);
    ctx.lineTo(e.offsetX+0.1,e.offsetY+0.1);
    ctx.stroke();
    strokes++;
});

function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    strokes=0;
    document.getElementById("feedback").textContent="";
}

function checkTrace(){
    if(strokes>200){ 
        document.getElementById("feedback").textContent="أحسنت!";
        
        // نحفظ النقاط
        localStorage.setItem("score", 100);

        // ننتقل لصفحة النتيجة
        setTimeout(()=>{
            window.location.href="activityresult.html";
        },1000);

    } else {
        document.getElementById("feedback").textContent="حاول تتبع الحروف بدقة أكبر";
    }
}

/* ===============================
   ميزة الصوت عند hover لجميع النصوص/الأزرار/الصور
   مع إيقاف الصوت القديم عند الانتقال لعنصر جديد
=================================*/
let currentUtterance=null;

document.querySelectorAll('h1, h2, p, button, input, img').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
        if(speechSynthesis.speaking){
            speechSynthesis.cancel();
        }

        let text="";
        if(el.tagName==='IMG') text=el.alt;
        else if(el.tagName==='INPUT') text=el.placeholder;
        else text=el.textContent;

        if(text){
            currentUtterance=new SpeechSynthesisUtterance(text);
            currentUtterance.lang="ar-SA";
            speechSynthesis.speak(currentUtterance);
        }
    });
});
</script>

</body>
</html>
