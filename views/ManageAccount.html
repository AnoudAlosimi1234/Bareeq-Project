<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة الحساب - بريق</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<div class="page account-page">

    <!-- Logo -->
    <div class="logo">
        <img src="assets/images/logo2.png" alt="شعار بريق" class="logo-img">
    </div>

    <h1 class="page-title">إدارة الحساب</h1>

    <!-- Account Card -->
    <div class="account-card">

        <div class="account-layout">
    
            <!-- صورة الحساب -->
            <div class="account-image">
                <img src="assets/images/Avatar.png" alt="صورة الحساب">
            </div>
    
            <!-- بيانات الحساب -->
            <div class="account-info">
    
                <div class="info-row">
                    <span class="label">الاسم:</span>
                    <span class="value">بدر</span>
                </div>
    
                <div class="info-row">
                    <span class="label">البريد الإلكتروني:</span>
                    <span class="value">test@email.com</span>
                </div>
    
                <div class="info-row">
                    <span class="label">العمر:</span>
                    <span class="value">6 سنوات</span>
                </div>
    
            </div>
    
        </div>
    
        <!-- الأزرار -->
        <div class="account-buttons">
            <button class="btn"onclick="window.location.href='Updateprofile.html'">تعديل البيانات</button>
            <button class="btn" onclick="window.location.href='logout.html'">تسجيل الخروج</button>
        </div>
    
    </div>

</body>
</html>
