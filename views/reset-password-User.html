<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور - بريق</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<div class="user-reset-page">

  <div class="user-reset-card">

      <h2 class="user-reset-title">إعادة تعيين كلمة المرور</h2>

      <form id="userResetForm" class="user-reset-form">

          <input type="email" id="resetEmail" 
          placeholder="البريد الإلكتروني" required>

          <input type="password" id="newPassword" 
          placeholder="كلمة المرور الجديدة" required>

          <input type="password" id="confirmPassword" 
          placeholder="تأكيد كلمة المرور" required>

          <button type="submit" class="user-reset-btn">
              حفظ التعديل
          </button>

      </form>

  </div>

</div>

<script>
document.getElementById("userResetForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("resetEmail").value.trim();
    const newPass = document.getElementById("newPassword").value.trim();
    const confirmPass = document.getElementById("confirmPassword").value.trim();

    if(!email || !newPass || !confirmPass){
        alert("يرجى تعبئة جميع الحقول");
        return;
    }

    if(newPass.length < 6){
        alert("كلمة المرور يجب أن تكون 6 أحرف على الأقل");
        return;
    }

    if(newPass !== confirmPass){
        alert("كلمة المرور غير متطابقة");
        return;
    }

    // مجرد ما يضغط يروح مباشرة لصفحة تسجيل الدخول
    window.location.href = "login.html";
});
</script>

</body>
</html>
