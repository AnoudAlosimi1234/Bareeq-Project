<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعديل كلمة المرور - بريق</title>
<link rel="stylesheet" href="Admin.css">
</head>
<body>

<div class="page admin-page">

  <div class="admin-card">
      <h2 class="admin-title">تعديل كلمة المرور</h2>

      <form id="resetForm" class="admin-login-form">
          <input type="email" id="resetEmail" placeholder="البريد الإلكتروني" required>
          <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة" required>
          <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>

          <button type="submit" class="admin-login-btn">
              حفظ التعديل
          </button>
      </form>
  </div>

</div>

<script>
document.getElementById("resetForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("resetEmail").value.trim();
    const newPass = document.getElementById("newPassword").value.trim();
    const confirmPass = document.getElementById("confirmPassword").value.trim();

    if(!email || !newPass || !confirmPass){
        alert("يرجى تعبئة جميع الحقول");
        return;
    }

    if(newPass !== confirmPass){
        alert("كلمة المرور غير متطابقة");
        return;
    }

    alert("تم تحديث كلمة المرور بنجاح ✅");
    window.location.href = "admin.html";
});
</script>

</body>
</html>
