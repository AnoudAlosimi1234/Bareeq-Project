<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الملف الشخصي - بريق</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>

<body class="page page-profile">

    <!-- Page Header -->
    <header class="page-header">
        <h1 class="page-title">الملف الشخصي</h1>
    </header>

    <!-- Decorative Elements -->
    <div class="decor-sun" aria-hidden="true">🌞</div>
    <div class="decor-cloud decor-cloud--left" aria-hidden="true">☁️</div>
    <div class="decor-cloud decor-cloud--right" aria-hidden="true">☁️</div>

    <!-- Profile Cards -->
    <section class="page-content profile-cards">

        <!-- بطاقة الطالب -->
        <div class="profile-card">
            <img class="profile-avatar" src="assets/images/Avatar.png" alt="avatar">
            <div class="profile-info">
                <div class="profile-name">بدر</div>
                <div class="profile-sub">الصف: الصف الأول</div>
            </div>
        </div>

        <!-- التقدم -->
        <div class="profile-card">
            <div class="profile-icon">⭐</div>
            <div class="profile-info">
                <div class="profile-title">التقدم والإنجازات</div>
                <div class="profile-sub">المستوى 5</div>
            </div>
        </div>

        <!-- المكافآت -->
        <div class="profile-card">
            <div class="profile-icon">🎁</div>
            <div class="profile-info">
                <div class="profile-title">مكافآتي</div>
                <div class="profile-sub">45 نقطة</div>
            </div>
        </div>

    </section>

    <div class="divider"></div>

    <!-- Action Buttons -->
    <div class="actions-container">
        <button class="btn btn-manage-account" onclick="window.location.href='ManageAccount.html'">
            ⚙️ إدارة الحساب
        </button>
        <button class="btn btn-back-learning">
            ⬅️ ارجع للتعلم
        </button>
    </div>

</body>
</html>
