<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الكتابة</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>

<body class="writing-page">

<header>

    <div class="logo">
        <img src="assets/images/logo.png" alt="شعار بريق" class="logo-img">
    </div>

    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>
    <div class="sun">🌞</div>

</header>

<main>

<h1 class="page-title">الكتابة</h1>

<div class="levels">

    <!-- المستوى المبتدئ -->
    <section class="level-card">
        <div class="level-title">المستوى المبتدئ</div>
        <div class="level-options">
            <span class="level-type">الحروف</span>
            <span class="status completed">مكتمل</span>
            <button class="enter-btn" onclick="goToExercise()">ادخل</button>
        </div>
    </section>

    <!-- المستوى المتوسط -->
    <section class="level-card">
        <div class="level-title">المستوى المتوسط</div>
        <div class="level-options">
            <span class="level-type">الكلمات</span>
            <span class="status in-progress">قيد التقدم</span>
            <button class="enter-btn" onclick="goToExercise()">ادخل</button>
        </div>
    </section>

    <!-- المستوى المتقدم -->
    <section class="level-card">
        <div class="level-title">المستوى المتقدم</div>
        <div class="level-options">
            <span class="level-type">الجمل</span>
            <span class="status not-started">لم نبدأ</span>
            <button class="enter-btn locked" disabled>مغلق</button>
        </div>
    </section>

</div>

<!-- 🔹 الأزرار صارت هنا مباشرة تحت البوكسات -->
<div class="buttons">
    <button class="btn primary" onclick="goToExercise()">اذهب للمستوى الحالي</button>
    <button class="btn secondary" onclick="goBack()">العودة إلى الشاشة الرئيسية</button>
</div>

<!-- 🔹 صورة البنت صارت آخر شيء -->
<div class="girl">
    <img src="assets/images/A girl-main activity.png" alt="طفلة تكتب">
</div>

</main>

<script>
function goBack(){
    window.location.href="mainActivity.html";
}

function goToExercise(){
    window.location.href="Writing1.html";
}

function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "ar-SA";
    msg.rate = 0.85;
    msg.pitch = 1.1;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

window.addEventListener("load", () => {
    speak("هذه صفحة الكتابة. هيا لنبدأ رحلة التعلم معا");
});

document.querySelectorAll(".writing-page button, .writing-page span, .writing-page h1, .writing-page .level-title")
.forEach(el => {
    el.addEventListener("mouseenter", () => {
        const text = el.innerText.trim();
        if(text !== ""){
            speak(text);
        }
    });
});
</script>

</body>
</html>
