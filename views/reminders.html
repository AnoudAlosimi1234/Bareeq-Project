
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بريق | تذكيرات الأنشطة</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>

<body class="page page-activities">

    <!-- Page Header -->
    <header class="page-header">
        <img src="assets/images/logo.png"
             alt="ثلاثة أطفال يقرأون كتاباً"
             class="main-children">
    </header>

    <!-- Page Title -->
    <section class="page-content">
        <h2 class="page-title">تذكيرات الأنشطة</h2>

        <section class="activities-list" aria-label="قائمة الأنشطة">

            <article class="activity-card">
                <div class="activity-content">
                    <strong>نشاط القراءة</strong>
                    <p>اليوم الساعة 5 مساءً</p>
                </div>
                <img src="assets/images/girl4.png"
                     alt="طفلة تمسك ساعة استعداداً لنشاط القراءة"
                     class="activity-image">
            </article>

            <article class="activity-card">
                <div class="activity-content">
                    <strong>نشاط حل الألغاز</strong>
                    <p>اليوم الساعة 3 مساءً</p>
                </div>
                <img src="assets/images/boy2.png"
                     alt="طفل يقوم بحل لغز"
                     class="activity-image">
            </article>

            <article class="activity-card">
                <div class="activity-content">
                    <strong>نشاط الكتابة</strong>
                    <p>مكتمل</p>
                </div>
                <img src="assets/images/girl2.png"
                     alt="طفلة تحمل علامة اكتمال الأنشطة"
                     class="activity-image">
            </article>

        </section>

        <!-- Bottom Illustrations -->
        <img src="assets/images/book.png" alt="" class="illustration-bottom-book">
        <img src="assets/images/girl3.png"
             alt="طفلة تمسك جرس للتذكير"
             class="illustration-bottom-girl">

    </section>

</body>
</html>
