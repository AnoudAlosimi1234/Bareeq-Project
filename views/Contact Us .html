<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصل معنا</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">

</head>

<div class="page page-contact">

    <!-- Clouds & Sun -->
    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>
    <div class="sun">🌞</div>

    <!-- Logo -->
    <div class="logo">
        <img src="assets/images/logo2.png" alt="شعار بريق">
    </div>

    <!-- Title & Subtitle -->
    <h2 class="title">تواصل معنا</h2>
    <p class="subtitle">فريق بريق يود سماع ملاحظاتك واقتراحاتك</p>

    <!-- Form -->
    <form class="form" action="thankyou.html">
        <input type="text" placeholder="الاسم" required>
        <input type="email" placeholder="البريد الإلكتروني" required>
        <textarea placeholder="اكتب رسالتك هنا" required></textarea>
        <select>
            <option>استفسار عام</option>
            <option>مشكلة تقنية</option>
            <option>اقتراح</option>
        </select>
        <button type="submit" class="send-btn">إرسال</button>
    </form>

    <!-- Child Image -->
    <img src="assets/images/boy_phone.png" alt="طفل يحمل هاتف" class="bottom-right">

</div>
